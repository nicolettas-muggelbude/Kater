name: AppImage Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Neue Version (z.B. 1.2.0 — ohne "v")'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4
        with:
          # fetch-depth 0 damit git push --tags funktioniert
          fetch-depth: 0

      - name: Git konfigurieren (nur bei workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Version in __init__.py aktualisieren und committen (nur bei workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          sed -i 's/__version__ = ".*"/__version__ = "${{ inputs.version }}"/' adressbuch/__init__.py
          git add adressbuch/__init__.py
          git commit -m "chore: Version ${{ inputs.version }}"
          git tag "v${{ inputs.version }}"
          git push
          git push --tags

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Systemabhängigkeiten installieren
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-tk \
            tk-dev \
            librsvg2-bin \
            libfuse2

      - name: Python-Pakete installieren
        run: pip install pyinstaller qrcode Pillow

      - name: Version ermitteln
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ inputs.version }}" >> $GITHUB_ENV
          else
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV
          fi

      - name: Versionsnummer in __init__.py aktualisieren (nur bei Tag-Push)
        if: github.event_name != 'workflow_dispatch'
        run: |
          sed -i "s/__version__ = \".*\"/__version__ = \"${{ env.VERSION }}\"/" adressbuch/__init__.py

      - name: PyInstaller Build
        run: pyinstaller kater.spec

      - name: AppImage bauen
        run: |
          bash build-appimage.sh "${{ env.VERSION }}"
          cp "Kater-${{ env.VERSION }}-x86_64.AppImage" "Kater-x86_64.AppImage"

      - name: Release erstellen und AppImage hochladen
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ env.VERSION }}"
          name: "Kater v${{ env.VERSION }}"
          files: |
            Kater-${{ env.VERSION }}-x86_64.AppImage
            Kater-x86_64.AppImage
          generate_release_notes: true
